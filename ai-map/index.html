// ─ Shaders ────────────────────────────────────────────────────────────────
const VS = `
  attribute vec2 a_pos;
  void main(){ gl_Position=vec4(a_pos,0.0,1.0); }
`;
const FS = `
  precision highp float;
  uniform vec2  u_res;
  uniform sampler2D u_tex;
  uniform float u_rotY;
  uniform float u_rotX;
  uniform float u_zoom;
  const float PI=3.14159265358979;
  const float R=90.0;
  const float FOV=44.0;
  void main(){
    float aspect=u_res.x/u_res.y;
    float tanH=tan(FOV*0.5*PI/180.0);
    vec2 ndc=(gl_FragCoord.xy/u_res)*2.0-1.0;
    vec3 ro=vec3(0.0,0.0,u_zoom);
    vec3 rd=normalize(vec3(ndc.x*aspect*tanH, ndc.y*tanH, -1.0));
    // Ray-sphere intersection
    float b=2.0*dot(ro,rd);
    float c=dot(ro,ro)-R*R;
    float disc=b*b-4.0*c;
    if(disc<0.0){gl_FragColor=vec4(0.0);return;}
    float t=(-b-sqrt(disc))*0.5;
    if(t<0.0){gl_FragColor=vec4(0.0);return;}
    vec3 n=normalize(ro+t*rd);
    // Inverse Y rotation (undo globeGroup.rotation.y)
    float cy=cos(-u_rotY),sy=sin(-u_rotY);
    float nx=n.x*cy-n.z*sy;
    float nz=n.x*sy+n.z*cy;
    n=vec3(nx,n.y,nz);
    // Inverse X rotation (undo globeGroup.rotation.x)
    float cx2=cos(-u_rotX),sx2=sin(-u_rotX);
    float ny2=n.y*cx2+n.z*sx2;
    nz=-n.y*sx2+n.z*cx2;
    n=vec3(n.x,ny2,nz);
    // Equirectangular UV (offset +0.25 aligns with Three.js SphereGeometry UVs)
    float u=fract(atan(n.x,n.z)/(2.0*PI)+0.25);
    float v=0.5-asin(clamp(n.y,-1.0,1.0))/PI;
    // Soft edge fade at sphere rim
    float edgeFade=1.0-smoothstep(0.88,1.0,length((gl_FragCoord.xy/u_res-0.5)*vec2(aspect,1.0))/0.5);
    vec4 col=texture2D(u_tex,vec2(u,v));
    gl_FragColor=vec4(col.rgb,col.a*edgeFade);
  }
`;

}

}

// ─ Load the real texture (fetch→blob first, then img crossOrigin, then canvas fallback)
(async()=>{
  const IMG_URL='https://nasdaqbrandstudio.github.io/ai-map/globe-wrap.jpg';
  // Show canvas fallback immediately so globe isn't empty
  uploadCanvas(makeCanvasFallback());
  // Try fetch → blob URL (avoids WebGL CORS taint from file:// context)
  try{
    const resp=await fetch(IMG_URL,{mode:'cors',cache:'force-cache'});
    if(resp.ok){
      const blob=await resp.blob();
      const bu=URL.createObjectURL(blob);
      const img=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=bu;});
      uploadImg(img);URL.revokeObjectURL(bu);return;
    }
  }catch(e){}
  // Fallback 2: crossOrigin attribute
  try{
    const img=await new Promise((res,rej)=>{
      const i=new Image();i.crossOrigin='anonymous';
      i.onload=()=>res(i);i.onerror=rej;
      i.src=IMG_URL+'?t='+Date.now();
    });
    uploadImg(img);
  }catch(e){/* canvas fallback already shown */}
})();

// ─ Draw sphere to bgc each frame ──────────────────────────────────────────
gl.enable(gl.BLEND);
gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
function drawBgGlobe(rx,ry,z){
  if(!bgTex)return;
  gl.clearColor(0.031,0.031,0.031,1); // #080808
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(bgProg);
  gl.bindBuffer(gl.ARRAY_BUFFER,qBuf);
  gl.enableVertexAttribArray(aPos2);
  gl.vertexAttribPointer(aPos2,2,gl.FLOAT,false,0,0);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D,bgTex);
  gl.uniform2f(uRes,bgCanvas.width,bgCanvas.height);
  gl.uniform1i(uTex2,0);
  gl.uniform1f(uRotY2,ry);
  gl.uniform1f(uRotX2,rx);
  gl.uniform1f(uZoom2,z);
  gl.drawArrays(gl.TRIANGLES,0,6);
}

// Three.js material for the invisible hit-sphere (raycasting only, not rendered)

    transparent:true,opacity:.09,side:THREE.BackSide})));

// Subtle grid overlay
const gm=new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:.055});
function ll2v(lat,lng,r){
  const phi=(90-lat)*Math.PI/180,theta=(lng+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));
}
function addLat(d){const pts=[],la=d*Math.PI/180;
  for(let i=0;i<=80;i++){const lo=(i/80)*Math.PI*2-Math.PI;
    pts.push(new THREE.Vector3(R*Math.cos(la)*Math.cos(lo),R*Math.sin(la),R*Math.cos(la)*Math.sin(lo)));}
  globeG.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),gm));}
function addLng(d){const pts=[],lo=d*Math.PI/180;
  for(let i=0;i<=80;i++){const la=(i/80)*Math.PI-Math.PI/2;
    pts.push(new THREE.Vector3(R*Math.cos(la)*Math.cos(lo),R*Math.sin(la),R*Math.cos(la)*Math.sin(lo)));}
  globeG.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),gm));}
[-60,-30,0,30,60].forEach(addLat);
for(let d=-150;d<=180;d+=30)addLng(d);

// ════════════════════ USER SPRITES ════════════
const txCache={};
function makeTex(word,color){
  const k=word+'|'+color;if(txCache[k])return txCache[k];
  const fs=12,pad=5,cv=document.createElement('canvas'),cx=cv.getContext('2d');
  cx.font=`500 ${fs}px "DM Sans",system-ui,sans-serif`;
  const tw=cx.measureText(word).width;
  cv.width=Math.ceil(tw)+pad*2;cv.height=fs+pad*2;cx.clearRect(0,0,cv.width,cv.height);
  cx.font=`500 ${fs}px "DM Sans",system-ui,sans-serif`;
  cx.fillStyle=color;cx.globalAlpha=.76;
  cx.fillText(word,pad,fs+pad*.55);
  const t=new THREE.CanvasTexture(cv);txCache[k]=t;return t;
}

const shuffled=[...USERS].sort(()=>Math.random()-.5);
const nodes=[];
const dotGeo=new THREE.SphereGeometry(.5,6,6);
const rcTargets=[];
let trickleIdx=0,trickleDone=false;
const seenCities=new Set(),seenConts=new Set();
const svEl=document.getElementById('sv'),scEl=document.getElementById('sc'),skEl=document.getElementById('sk');

function addNode(u){
  const col=u.c||'#aaaaaa';
  // Dot
  const dot=new THREE.Mesh(dotGeo,
    new THREE.MeshBasicMaterial({color:new THREE.Color(col),transparent:true,opacity:.9}));
  dot.position.copy(ll2v(u.lat,u.lng,R+.9));
  dot.scale.set(.001,.001,.001);
  dot.userData={u};globeG.add(dot);rcTargets.push(dot);
  // Keyword sprite
  const tex=makeTex(u.kw,col);
  const asp=tex.image.width/tex.image.height;
  const h=1.8;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,opacity:0,depthWrite:false}));
  sp.scale.set(h*asp,h,1);
  const base=ll2v(u.lat,u.lng,R+3.1);
  sp.position.copy(base);sp.userData={u};
  globeG.add(sp);rcTargets.push(sp);
  nodes.push({sp,dot,u,base:base.clone(),phase:Math.random()*Math.PI*2});
  // GSAP entry animations
  gsap.to(dot.scale,{x:1,y:1,z:1,duration:.5,ease:'back.out(1.8)',delay:Math.random()*.12});
  gsap.to(sp.material,{opacity:.70,duration:.7,ease:'power2.out',delay:.1+Math.random()*.1});
}

// ════════════════════ TOOLTIP + CONNECTOR ═════
const ttEl=document.getElementById('tooltip');
const ttLoc=document.getElementById('tt-loc'),ttMeta=document.getElementById('tt-meta');
const ttKw=document.getElementById('tt-kw'),ttSent=document.getElementById('tt-sent');
const ttResp=document.getElementById('tt-resp');
const cline=document.getElementById('cline'),cdot=document.getElementById('cdot');
let tipTween=null,connTween=null;
let connTarget=null; // {lat,lng,tipCX,tipCY}

function fillTip(u){
  ttLoc.textContent=u.city+', '+u.country;
  ttMeta.textContent=u.age+' · '+u.occ;
  ttKw.textContent=u.kw;ttKw.style.color=u.c;
  ttSent.textContent=u.s;ttSent.style.color=u.c;
  ttResp.textContent='"'+u.r+'"';
}

let tipLeft=0,tipTop=0,tipW=255,tipH=175;

function placeTipAt(x,y){
  let lx=x+16,ly=y-18;
  if(lx+tipW>innerWidth-10)lx=x-tipW-16;
  if(ly+tipH>innerHeight-10)ly=innerHeight-tipH-10;
  ttEl.style.left=lx+'px';ttEl.style.top=ly+'px';
  tipLeft=lx;tipTop=ly;
}
function placeTipDemo(){
  const lx=innerWidth*.63,ly=innerHeight*.5-tipH*.5;
  ttEl.style.left=lx+'px';ttEl.style.top=ly+'px';
  tipLeft=lx;tipTop=ly;
}

function showTipGsap(){
  if(tipTween)tipTween.kill();
  tipTween=gsap.fromTo(ttEl,{opacity:0,y:8},{opacity:1,y:0,duration:.42,ease:'power3.out'});
}
function hideTipGsap(cb){
  if(tipTween)tipTween.kill();
  connTarget=null;hideConnector();
  tipTween=gsap.to(ttEl,{opacity:0,y:-6,duration:.3,ease:'power3.in',onComplete:cb||function(){}});
}

// Connector helpers
const _wp2=new THREE.Vector3();
function projectPt(lat,lng){
  _wp2.copy(ll2v(lat,lng,R+.9));
  globeG.localToWorld(_wp2);
  const gp=new THREE.Vector3();globeG.getWorldPosition(gp);
  const norm=_wp2.clone().sub(gp).normalize();
  if(camera.position.clone().sub(_wp2).dot(norm)<0)return null;
  _wp2.project(camera);
  if(_wp2.z>1)return null;
  return{x:(_wp2.x+1)/2*innerWidth,y:(-_wp2.y+1)/2*innerHeight};
}

function drawConnector(sx,sy,tx,ty){
  cline.setAttribute('x1',sx);cline.setAttribute('y1',sy);
  cline.setAttribute('x2',tx);cline.setAttribute('y2',ty);
  cdot.setAttribute('cx',sx);cdot.setAttribute('cy',sy);
  const len=Math.hypot(tx-sx,ty-sy);
  cline.setAttribute('stroke-dasharray',len+' '+len);
  cline.setAttribute('stroke-dashoffset',len);
  if(connTween)connTween.kill();
  gsap.set([cline,cdot],{opacity:0});
  connTween=gsap.timeline()
    .to(cdot,{opacity:1,duration:.25,ease:'power2.out'})
    .to(cline,{opacity:1,duration:.15,ease:'power2.out'},'<')
    .to(cline,{attr:{'stroke-dashoffset':0},duration:.55,ease:'power2.inOut'},'<.05');
}
function hideConnector(){
  if(connTween)connTween.kill();
  gsap.to([cline,cdot],{opacity:0,duration:.25});
}
function updateConnector(){
  if(!connTarget)return;
  const sp=projectPt(connTarget.lat,connTarget.lng);
  if(!sp){hideConnector();return;}
  const tx=connTarget.tipCX,ty=connTarget.tipCY;
  cline.setAttribute('x1',sp.x);cline.setAttribute('y1',sp.y);
  cline.setAttribute('x2',tx);cline.setAttribute('y2',ty);
  cdot.setAttribute('cx',sp.x);cdot.setAttribute('cy',sp.y);
}

// ════════════════════ CAMERA STATE ════════════
let zoom=268,tZoom=268;
const EASE=.038;

// ════════════════════ STATE MACHINE ═══════════
let state='INTRO'; // INTRO | DEMO | USER
let demoPhase=null; // ENTERING | NAVIGATING | HOLDING
let demoUser=null;
let introTO=null,demoTO=null;
let autoRot=true;
let isDrag=false,prevM={x:0,y:0};
let hovIdx=-1;
let gRotTween=null,isGsapRot=false;

// ════════════════════ TRICKLE (2 MINUTES) ═════
const TRICKLE_MS=120000;
let trickleStart=performance.now();

function updateTrickle(now){
  if(trickleDone)return;
  const el=now-trickleStart;
  const target=Math.min(USERS.length,Math.floor(el/TRICKLE_MS*USERS.length));
  while(trickleIdx<target){
    const u=shuffled[trickleIdx];
    addNode(u);seenCities.add(u.city);seenConts.add(u.continent);
    trickleIdx++;
  }
  svEl.textContent=trickleIdx;scEl.textContent=seenCities.size;skEl.textContent=seenConts.size;
  if(trickleIdx>=USERS.length&&!trickleDone){trickleDone=true;}
}

// ════════════════════ DEMO LOGIC ══════════════
function startIntroTimer(){
  clearTimeout(introTO);
  introTO=setTimeout(()=>{if(state==='INTRO')beginDemo();},5000);
}

function beginDemo(){
  state='DEMO';demoPhase='ENTERING';autoRot=false;
  tZoom=190;
  setTimeout(()=>{if(state==='DEMO')navigateToVoice();},1800);
}

function navigateToVoice(){
  if(state!=='DEMO')return;
  demoPhase='NAVIGATING';
  hideTipGsap();
  // Pick from already-placed users
  const placed=shuffled.slice(0,Math.max(1,trickleIdx));
  demoUser=placed[Math.floor(Math.random()*placed.length)];

  const tx=Math.max(-1.3,Math.min(1.3,-demoUser.lat*Math.PI/180));
  const rawY=(demoUser.lng+180)*Math.PI/180-Math.PI/2;
  const cur=globeG.rotation.y;
  let d=((rawY-cur)%(Math.PI*2)+Math.PI*3)%(Math.PI*2)-Math.PI;
  const ty=cur+d;

  if(gRotTween)gRotTween.kill();
  isGsapRot=true;
  gRotTween=gsap.to(globeG.rotation,{
    x:tx,y:ty,
    duration:1.6,
    ease:'power3.inOut',
    onComplete:()=>{
      isGsapRot=false;
      if(state!=='DEMO')return;
      demoPhase='HOLDING';
      fillTip(demoUser);placeTipDemo();showTipGsap();
      // Connector after tip placed
      requestAnimationFrame(()=>{
        const sp=projectPt(demoUser.lat,demoUser.lng);
        if(sp){
          const cx2=tipLeft;const cy2=tipTop+tipH*.5;
          connTarget={lat:demoUser.lat,lng:demoUser.lng,tipCX:cx2,tipCY:cy2};
          drawConnector(sp.x,sp.y,cx2,cy2);
        }
        demoTO=setTimeout(()=>{
          if(state!=='DEMO')return;
          hideTipGsap(()=>{ demoTO=setTimeout(()=>navigateToVoice(),400); });
        },3800);
      });
    }
  });
}

function stopDemo(){
  clearTimeout(demoTO);clearTimeout(introTO);
  if(gRotTween)gRotTween.kill();gRotTween=null;isGsapRot=false;
  hideTipGsap();demoPhase=null;demoUser=null;
}

function onInteract(){
  if(state==='INTRO'){clearTimeout(introTO);state='USER';autoRot=false;}
  else if(state==='DEMO'){stopDemo();state='USER';autoRot=false;}
}

function checkReturnToIntro(){
  if(state==='USER'&&zoom>238){state='INTRO';autoRot=true;startIntroTimer();}
}

// ════════════════════ MOUSE / WHEEL ═══════════
const ray=new THREE.Raycaster();ray.params.Sprite={threshold:3};
const m2=new THREE.Vector2();

document.addEventListener('mousedown',e=>{
  isDrag=true;prevM={x:e.clientX,y:e.clientY};onInteract();hideTipGsap();hovIdx=-1;
});
document.addEventListener('mouseup',()=>isDrag=false);
document.addEventListener('mousemove',e=>{
  if(isDrag){
    const dx=e.clientX-prevM.x,dy=e.clientY-prevM.y;
    globeG.rotation.y+=dx*.007;
    globeG.rotation.x=Math.max(-1.4,Math.min(1.4,globeG.rotation.x+dy*.007));
    prevM={x:e.clientX,y:e.clientY};hideTipGsap();hovIdx=-1;return;
  }
  if(state==='DEMO')return;
  m2.x=(e.clientX/innerWidth)*2-1;m2.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(m2,camera);
  const hits=ray.intersectObjects(rcTargets);
  if(hits.length){
    const u=hits[0].object.userData.u;if(!u)return;
    const i=USERS.indexOf(u);
    if(i!==hovIdx){
      hovIdx=i;fillTip(u);placeTipAt(e.clientX,e.clientY);showTipGsap();
      const sp=projectPt(u.lat,u.lng);
      if(sp){const cx2=tipLeft;const cy2=tipTop+tipH*.5;
        connTarget={lat:u.lat,lng:u.lng,tipCX:cx2,tipCY:cy2};
        drawConnector(sp.x,sp.y,cx2,cy2);}
    }else{
      placeTipAt(e.clientX,e.clientY);
      if(connTarget){connTarget.tipCX=tipLeft;connTarget.tipCY=tipTop+tipH*.5;}
    }
    document.body.style.cursor='pointer';
  }else{hovIdx=-1;hideTipGsap();document.body.style.cursor='default';}
});
document.addEventListener('wheel',e=>{
  onInteract();tZoom=Math.max(115,Math.min(380,tZoom+e.deltaY*.36));checkReturnToIntro();
},{passive:true});

// ════════════════════ ANIMATION LOOP ══════════
const titleEl=document.getElementById('title');
const overlayEl=document.getElementById('overlay');
let t=0;

function animate(now){
  requestAnimationFrame(animate);
  t+=.01;
  updateTrickle(now);

  // Zoom lerp
  zoom+=(tZoom-zoom)*EASE;
  camera.position.z=zoom;

  // Rotation — only if not driven by GSAP
  if(!isGsapRot){
    if(autoRot)globeG.rotation.y+=.0013;
  }

  // Sprite float
  nodes.forEach(({sp,base,phase})=>{
    const n=base.clone().normalize();
    sp.position.copy(base).addScaledVector(n,Math.sin(t*.65+phase)*.2);
  });

  // Title: fully gone by zoom=220, scale-through effect
  const zp=Math.max(0,Math.min(1,(268-zoom)/48));   // 0@268, 1@220
  titleEl.style.transform=`scale(${(1+zp*10).toFixed(4)})`;
  titleEl.style.opacity=Math.max(0,1-zp*1.3).toFixed(3);

  // Overlay
  overlayEl.style.opacity=Math.max(0,Math.min(1,(zoom-150)/118));

  // Live connector update
  updateConnector();

  drawBgGlobe(globeG.rotation.x, globeG.rotation.y, zoom);
  renderer.render(scene,camera);
}
animate(performance.now());
startIntroTimer();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
