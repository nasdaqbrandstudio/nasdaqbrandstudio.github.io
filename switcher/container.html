<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Container</title>
  <style>
    html, body { margin:0; height:100%; }
    iframe { width:100%; height:100%; border:0; display:block; }
  </style>
</head>
<body>
  <!-- This is all the viewer sees. No switch. Shows page-header by default. -->
  <iframe id="stage" src="page-header.html" title="Container"></iframe>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { firebaseConfig } from "./firebase-config.js";

    const db    = getDatabase(initializeApp(firebaseConfig));
    const stage = document.getElementById('stage');
    const pages = { index: 'page-header.html', livestream: 'livestream.html' };

    // Live subscription. The instant the operator flips the switch, this fires
    // for EVERY container that's open, on any device, and swaps the iframe.
    onValue(ref(db, 'view'), (snap) => {
      const target = pages[snap.val()] || pages.index;  // default: page header
      if (!stage.src.endsWith(target)) stage.src = target;
    });
  </script>
</body>
</html>
