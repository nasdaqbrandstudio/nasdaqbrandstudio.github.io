<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Livestream header</title>
  <style>
    html, body { margin:0; height:100%; }
    body { display:flex; align-items:center; gap:14px; padding:0 32px;
           background:#0b0d10; color:#e9edf2;
           font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,sans-serif; }
    .live { display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:700;
            letter-spacing:0.08em; color:#ff4d4f; }
    .dot { width:9px; height:9px; border-radius:50%; background:#ff4d4f; }
    h1 { font-size:32px; margin:0; letter-spacing:-0.02em; }
  </style>
</head>
<body>
  <span class="live"><span class="dot"></span>LIVE</span>
  <h1>Livestream header</h1>
</body>
</html>
