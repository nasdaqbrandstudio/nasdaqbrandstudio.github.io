<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Switcher</title>
  <style>
    :root { --bg:#0b0d10; --fg:#e9edf2; --muted:#8a93a0; --accent:#3da9fc; }
    * { box-sizing:border-box; }
    html, body { margin:0; height:100%; }
    body { display:flex; align-items:center; justify-content:center; gap:14px;
           background:var(--bg); color:var(--fg);
           font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,sans-serif; }

    .name { font-size:13px; font-weight:600; color:var(--muted); transition:color .2s; }
    .name.active { color:var(--fg); }

    .toggle { display:inline-flex; align-items:center; cursor:pointer; user-select:none; }
    .track { width:58px; height:30px; border-radius:999px; background:rgba(255,255,255,0.14);
             position:relative; transition:background .2s; }
    .knob { position:absolute; top:4px; left:4px; width:22px; height:22px; border-radius:50%;
            background:var(--fg); transition:transform .2s; }
    .toggle.on .track { background:var(--accent); }
    .toggle.on .knob  { transform:translateX(28px); }
  </style>
</head>
<body>
  <span class="name active" id="label-index">Page header</span>
  <div class="toggle" id="toggle" role="switch" tabindex="0" aria-checked="false">
    <div class="track"><div class="knob"></div></div>
  </div>
  <span class="name" id="label-live">Livestream</span>

  <script>
    const toggle = document.getElementById('toggle');
    const li     = document.getElementById('label-index');
    const ll     = document.getElementById('label-live');

    function set(live) {
      toggle.classList.toggle('on', live);
      toggle.setAttribute('aria-checked', String(live));
      li.classList.toggle('active', !live);
      ll.classList.toggle('active', live);
      // tell the container which header to show
      window.parent.postMessage({ type:'switch', view: live ? 'livestream' : 'index' }, '*');
    }

    toggle.addEventListener('click', () => set(!toggle.classList.contains('on')));
    toggle.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); set(!toggle.classList.contains('on')); }
    });
  </script>
</body>
</html>
