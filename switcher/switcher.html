<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Switcher</title>
  <style>
    :root { --bg:#0b0d10; --fg:#e9edf2; --muted:#8a93a0; --accent:#3da9fc; }
    * { box-sizing:border-box; }
    html, body { margin:0; height:100%; }
    body { display:grid; place-items:center; background:var(--bg); color:var(--fg);
           font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,sans-serif; }
    .panel { text-align:center; }
    .eyebrow { font-size:12px; letter-spacing:0.12em; text-transform:uppercase;
               color:var(--muted); margin-bottom:24px; }
    .row { display:flex; align-items:center; justify-content:center; gap:14px; }
    .name { font-size:14px; font-weight:600; color:var(--muted); transition:color .2s; }
    .name.active { color:var(--fg); }
    .toggle { display:inline-flex; align-items:center; cursor:pointer; user-select:none; }
    .track { width:64px; height:34px; border-radius:999px; background:rgba(255,255,255,0.14);
             position:relative; transition:background .2s; }
    .knob { position:absolute; top:4px; left:4px; width:26px; height:26px; border-radius:50%;
            background:var(--fg); transition:transform .2s; }
    .toggle.on .track { background:var(--accent); }
    .toggle.on .knob  { transform:translateX(30px); }
    .status { margin-top:26px; font-size:13px; color:var(--muted); }
    .status b { color:var(--fg); }
  </style>
</head>
<body>
  <div class="panel">
    <div class="eyebrow">Operator control</div>
    <div class="row">
      <span class="name active" id="label-header">Page header</span>
      <div class="toggle" id="toggle" role="switch" tabindex="0" aria-checked="false">
        <div class="track"><div class="knob"></div></div>
      </div>
      <span class="name" id="label-live">Livestream</span>
    </div>
    <div class="status">Live to all viewers: <b id="now">…</b></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { firebaseConfig } from "./firebase-config.js";

    const db      = getDatabase(initializeApp(firebaseConfig));
    const viewRef = ref(db, 'view');

    const toggle = document.getElementById('toggle');
    const lh     = document.getElementById('label-header');
    const ll     = document.getElementById('label-live');
    const now    = document.getElementById('now');

    function paint(live) {
      toggle.classList.toggle('on', live);
      toggle.setAttribute('aria-checked', String(live));
      lh.classList.toggle('active', !live);
      ll.classList.toggle('active', live);
      now.textContent = live ? 'Livestream' : 'Page header';
    }

    // Reflect the current live value (and any change made elsewhere).
    onValue(viewRef, (snap) => paint(snap.val() === 'livestream'));

    function flip() {
      const next = toggle.classList.contains('on') ? 'index' : 'livestream';
      set(viewRef, next);   // writes once -> pushed live to every container
    }
    toggle.addEventListener('click', flip);
    toggle.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
    });
  </script>
</body>
</html>
