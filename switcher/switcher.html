<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Switcher</title>
  <style>
    :root {
      --bar-bg: #0b0d10;
      --bar-fg: #e9edf2;
      --muted: #8a93a0;
      --active-bg: #ffffff;
      --active-fg: #0b0d10;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
    }

    /* full-height column: control bar on top, iframe fills the rest */
    body {
      display: flex;
      flex-direction: column;
    }

    .bar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--bar-bg);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .segmented {
      display: inline-flex;
      padding: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: calc(var(--radius) + 4px);
    }

    .segmented button {
      appearance: none;
      border: 0;
      cursor: pointer;
      padding: 8px 22px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--muted);
      background: transparent;
      border-radius: var(--radius);
      transition: color 0.18s ease, background 0.18s ease;
    }

    .segmented button:hover { color: var(--bar-fg); }

    .segmented button.active {
      color: var(--active-fg);
      background: var(--active-bg);
    }

    /* the stage where the swapped pages render */
    iframe {
      flex: 1 1 auto;
      width: 100%;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <nav class="bar">
    <div class="segmented" id="controls">
      <button data-src="index.html" class="active">Index</button>
      <button data-src="livestream.html">Livestream</button>
    </div>
  </nav>

  <iframe id="stage" src="index.html" title="Stage"></iframe>

  <script>
    const stage = document.getElementById('stage');
    const buttons = document.querySelectorAll('#controls button');

    buttons.forEach(function (btn) {
      btn.addEventListener('click', function () {
        // 1. point the iframe at the chosen page
        stage.src = btn.dataset.src;
        // 2. move the active state to the clicked button
        buttons.forEach(function (b) {
          b.classList.toggle('active', b === btn);
        });
      });
    });
  </script>
</body>
</html>
