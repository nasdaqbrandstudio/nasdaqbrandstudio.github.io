<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Building Beyond the Edge</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
    }

    /* Header embed: full width, 70% of the viewport height */
    .header-embed {
      display: block;
      width: 100%;
      height: 70vh;
      border: 0;
    }

    /* Image below: full width, natural height so the full image
       shows and the page scrolls to reveal it */
    .full-image {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>

  <iframe
    class="header-embed"
    src="https://nasdaqbrandstudio.github.io/edge/header/index-v2.html"
    title="Building Beyond the Edge — Header">
  </iframe>

  <img
    class="full-image"
    src="https://nasdaqbrandstudio.github.io/edge/header/images/background.jpg"
    alt="Background">

</body>
</html>
