<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Building Beyond the Edge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #000; overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
  }
  #hero-root {
    position: relative;
    width: 100%; height: 100%; min-height: 100%;
  }
  #bg-video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; z-index: 0;
  }
  #c { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }

  /* readability scrim — darkens lower-left so the copy holds against the video */
  .scrim {
    position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background:
      linear-gradient(105deg, rgba(0,0,0,0.62) 0%, rgba(0,0,0,0.30) 38%, rgba(0,0,0,0.0) 68%),
      linear-gradient(0deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.0) 45%);
  }

  /* header copy — sits above everything, doesn't block cursor ripples */
  .content {
    position: absolute; z-index: 3; pointer-events: none;
    left: 0; bottom: 0;
    padding: clamp(28px, 6vw, 88px);
    max-width: min(760px, 86%);
  }
  .content h1 {
    margin: 0 0 18px 0;
    font-weight: 600;
    font-size: clamp(34px, 5.6vw, 76px);
    line-height: 1.02;
    letter-spacing: -0.02em;
    color: #f4f6fb;
    text-shadow: 0 2px 30px rgba(0,0,0,0.35);
  }
  .content .sub {
    margin: 0 0 16px 0;
    font-weight: 500;
    font-size: clamp(16px, 1.9vw, 23px);
    line-height: 1.35;
    letter-spacing: -0.005em;
    color: #cdd6e8;
  }
  .content .body {
    margin: 0;
    font-weight: 400;
    font-size: clamp(13px, 1.25vw, 16px);
    line-height: 1.6;
    color: rgba(205, 214, 232, 0.78);
    max-width: 560px;
  }
  .content > * {
    opacity: 0;
    transform: translateY(14px);
    animation: rise 1.2s cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
  }
  .content h1   { animation-delay: 0.35s; }
  .content .sub { animation-delay: 0.55s; }
  .content .body{ animation-delay: 0.72s; }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  .loader {
    position: absolute; inset: 0; background: #000; z-index: 9;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.8s;
    font-size: 10px; letter-spacing: 0.32em; color: #3a4050;
    font-weight: 500; padding: 0 24px; text-align: center; line-height: 1.6;
  }
  .loader.gone { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div id="hero-root">
  <video id="bg-video" crossorigin="anonymous" muted loop playsinline autoplay preload="auto"></video>
  <canvas id="c"></canvas>
  <div class="scrim"></div>
  <div class="content">
    <h1>Building Beyond the Edge</h1>
    <p class="sub">The edge isn&rsquo;t the end &ndash; it&rsquo;s where building begins.</p>
    <p class="body">As AI and other innovative technologies power a new era of economy where infrastructure, intelligence and capital converge, Nasdaq exists to help builders push beyond the edge and enable progress to scale.</p>
  </div>
  <div class="loader" id="loader">INITIALIZING</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const root = document.getElementById('hero-root');
const loaderEl = document.getElementById('loader');
const video = document.getElementById('bg-video');
const setStatus = (s) => { loaderEl.textContent = s; };
function fail(msg) { setStatus('ERR · ' + msg); loaderEl.style.color = '#ff6688'; console.error(msg); }

const VIDEO_URL = 'https://cdn.jwplayer.com/videos/jeOazJCj-qgCdanU1.mp4';
const MAX_DROPS = 16;

if (typeof THREE === 'undefined') { fail('three.js failed to load'); throw new Error('no THREE'); }

function containerSize() {
  const r = root.getBoundingClientRect();
  return {
    w: Math.max(2, Math.floor(r.width  || root.clientWidth  || 1280)),
    h: Math.max(2, Math.floor(r.height || root.clientHeight || 720)),
  };
}

async function init() {
  setStatus('LOADING VIDEO');
  try {
    video.src = VIDEO_URL;
    video.addEventListener('error', () => console.warn('video element error event'));
    const ensurePlay = () => { try { const p = video.play(); if (p && p.catch) p.catch(()=>{}); } catch(e){} };
    ensurePlay();
    root.addEventListener('pointerdown', ensurePlay, { once: true });
    root.addEventListener('pointermove', ensurePlay, { once: true });
    await new Promise((resolve) => {
      if (video.videoWidth > 0) return resolve();
      video.addEventListener('loadeddata', resolve, { once: true });
      video.addEventListener('canplay', resolve, { once: true });
      setTimeout(resolve, 3000);   // never hang on the video
    });
  } catch (e) {
    console.warn('video setup issue, continuing anyway', e);
  }

  setStatus('BUILDING SCENE');

  let { w: CW, h: CH } = containerSize();
  const canvas = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(CW, CH, false);

  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

  const videoTex = new THREE.VideoTexture(video);
  videoTex.minFilter = THREE.LinearFilter;
  videoTex.magFilter = THREE.LinearFilter;

  const vidAspect = (video.videoWidth || 16) / (video.videoHeight || 9);

  // drop ring buffer: each is (uvx, uvy, birthTime); birth < 0 = inactive
  const drops = [];
  for (let i = 0; i < MAX_DROPS; i++) drops.push(new THREE.Vector3(0, 0, -1));
  let dropIdx = 0;

  const uniforms = {
    uVideo:       { value: videoTex },
    uResolution:  { value: new THREE.Vector2(CW, CH) },
    uVideoAspect: { value: vidAspect },
    uTime:        { value: 0 },
    uDrops:       { value: drops },
    uDispScale:   { value: 1.0 },   // global distortion strength multiplier
  };

  // === FULL-FRAME RIPPLED GLASS =============================================
  // The whole frame is viewed through an animated sheet of textured glass.
  // A height field h(uv) = always-on rolled-glass shimmer + a sum of expanding
  // ring ripples spawned along the cursor's path. The gradient of h becomes a
  // UV displacement applied to the video (with chromatic split), and crests of
  // the height field get a thin bright highlight to sell the refraction.
  const material = new THREE.ShaderMaterial({
    uniforms,
    vertexShader: `
      varying vec2 vUv;
      void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
    `,
    fragmentShader: `
      precision highp float;
      #define MAX_DROPS ${MAX_DROPS}
      uniform sampler2D uVideo;
      uniform vec2  uResolution;
      uniform float uVideoAspect;
      uniform float uTime;
      uniform vec3  uDrops[MAX_DROPS];
      uniform float uDispScale;
      varying vec2  vUv;

      float contA;          // container aspect (set in main)
      vec2  aspV;

      vec2 coverUv(vec2 uv) {
        float vidA = uVideoAspect;
        vec2 s = vec2(1.0);
        if (contA > vidA) s.y = vidA / contA;
        else              s.x = contA / vidA;
        return (uv - 0.5) * s + 0.5;
      }

      // sample the video with chromatic dispersion along the displacement
      vec3 sampleVideo(vec2 uv, vec2 disp, float chroma) {
        vec2 b = coverUv(uv) + disp;
        vec2 ch = disp * 0.12 * chroma;
        return vec3(
          texture2D(uVideo, b + ch).r,
          texture2D(uVideo, b).g,
          texture2D(uVideo, b - ch).b
        );
      }

      // One reeded sheet. Returns vec3: xy = refraction displacement (analytic
      // gradient of the flute profile), z = flute ridge value (for shading).
      // warp stretches/compresses the flute spacing so the pane looks pulled.
      vec3 reededSheet(vec2 q, float ang, float freq, float phase, vec2 warp) {
        vec2 n = vec2(cos(ang), sin(ang));
        float coord = dot(q * warp, n) * freq + phase;
        float ridge = sin(coord);
        vec2 disp = cos(coord) * freq * vec2(n.x * contA * warp.x, n.y * warp.y);
        return vec3(disp, ridge);
      }

      void main() {
        contA = uResolution.x / uResolution.y;
        aspV  = vec2(contA, 1.0);
        vec2 uv = vUv;
        vec2 q  = uv * aspV;
        float t = uTime;

        // ---- cursor influence ---------------------------------------------
        // The cursor doesn't dent the glass — it grabs the sheets and SHIFTS
        // them. Recent cursor activity builds a smooth field that pushes the
        // flutes (mostly vertically) and locally stretches their spacing, so
        // moving the cursor drags and refracts the panes.
        float sigma = 0.085;
        float push = 0.0;          // signed vertical push on the flutes
        vec2  pull = vec2(0.0);    // local stretch
        float act  = 0.0;          // overall local activity (for shading)
        for (int i = 0; i < MAX_DROPS; i++) {
          vec3 drop = uDrops[i];
          float birth = drop.z;
          float age = t - birth;
          if (birth >= 0.0 && age >= 0.0 && age < 2.6) {
            vec2 rv = uv - drop.xy;
            float d2 = dot(rv * aspV, rv * aspV);
            float g = exp(-d2 / (2.0 * sigma * sigma)) * exp(-age * 1.4);
            push += g * sign(rv.y + 0.0001);
            pull += g * rv * aspV;
            act  += g;
          }
        }

        // ---- slow ambient breathing of the whole pane --------------------
        // gentle, continuous stretch/shift so the glass is alive without a
        // cursor — but structured and directional (glass, not molten)
        float breath = sin(t * 0.20);
        float vshift = sin(t * 0.13) * 0.10 + push * 0.18;          // vertical glide
        vec2  warp   = vec2(
          1.0 + 0.18 * sin(t * 0.10) + pull.x * 0.5,               // horizontal stretch
          1.0 + 0.14 * sin(t * 0.16 + 1.7) + pull.y * 0.6 + act * 0.25  // vertical stretch
        );

        // ---- two reeded sheets sliding over one another -------------------
        // sheet 1: near-vertical flutes, slides horizontally, glides vertically
        float ang1 = 1.5708 + 0.12 * breath;                        // ~vertical
        vec3 sh1 = reededSheet(q + vec2(0.0, vshift), ang1, 21.0, t * 0.6, warp);
        // sheet 2: a second pane at a slight angle, drifting the other way
        float ang2 = 1.5708 + 0.55 + 0.10 * sin(t * 0.08);
        vec3 sh2 = reededSheet(q + vec2(0.0, vshift * 0.6), ang2, 33.0, -t * 0.5, warp);

        // combine: the two panes refract additively (sheets stacked)
        vec2 disp = sh1.xy * 0.0020 + sh2.xy * 0.0013;
        float ridge = sh1.z * 0.6 + sh2.z * 0.4;

        // a soft third large-scale lens so big areas gently bend (depth)
        disp += vec2(
          cos(q.x * 1.8 * warp.x + t * 0.3) * 1.8 * contA,
          cos(q.y * 2.1 * warp.y - t * 0.25) * 2.1
        ) * 0.006;

        float chroma = 1.0 + act * 1.2;     // cursor activity boosts dispersion

        // ---- compose ------------------------------------------------------
        vec3 col = sampleVideo(uv, disp * uDispScale, chroma);

        // bright specular glints on the flute crests — the giveaway of glass
        float crest = smoothstep(0.6, 1.0, ridge);
        col += vec3(0.55, 0.78, 1.05) * crest * 0.16;
        // soft darkening in the flute valleys for depth
        float valley = smoothstep(0.6, 1.0, -ridge);
        col -= vec3(0.10, 0.12, 0.18) * valley * 0.5;

        // edge sheen tracks how steeply the glass is bending (refraction lines)
        float bend = clamp(length(disp) * 18.0, 0.0, 1.0);
        col += vec3(0.45, 0.72, 1.0) * bend * 0.10;

        gl_FragColor = vec4(col, 1.0);
      }
    `,
  });

  scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));

  // === CURSOR → RIPPLES =====================================================
  // Spawn a drop whenever the cursor has moved far enough since the last one,
  // so dragging the cursor lays down a continuous wake of ripples.
  let last = { x: 0.5, y: 0.5, set: false };
  function spawnDrop(ux, uy) {
    drops[dropIdx].set(ux, uy, uniforms.uTime.value);
    dropIdx = (dropIdx + 1) % MAX_DROPS;
  }
  root.addEventListener('pointermove', (e) => {
    const r = root.getBoundingClientRect();
    const ux = (e.clientX - r.left) / r.width;
    const uy = 1.0 - (e.clientY - r.top) / r.height;
    if (!last.set) { last = { x: ux, y: uy, set: true }; spawnDrop(ux, uy); return; }
    const dx = ux - last.x, dy = uy - last.y;
    if (Math.hypot(dx, dy) > 0.015) { spawnDrop(ux, uy); last.x = ux; last.y = uy; }
  });
  // a click drops a bigger single ripple
  root.addEventListener('pointerdown', (e) => {
    const r = root.getBoundingClientRect();
    spawnDrop((e.clientX - r.left) / r.width, 1.0 - (e.clientY - r.top) / r.height);
  });

  function resize() {
    const { w, h } = containerSize();
    renderer.setSize(w, h, false);
    uniforms.uResolution.value.set(w, h);
  }
  if (typeof ResizeObserver !== 'undefined') new ResizeObserver(resize).observe(root);
  window.addEventListener('resize', resize);

  let textureOK = true;
  const clock = new THREE.Clock();
  function animate() {
    const t = clock.getElapsedTime();
    uniforms.uTime.value = t;

    if (textureOK) {
      try { renderer.render(scene, camera); }
      catch (err) {
        textureOK = false;
        canvas.style.display = 'none';   // CORS-tainted: fall back to plain HTML video
        console.warn('video texture blocked by CORS; showing plain video', err);
      }
    }
    requestAnimationFrame(animate);
  }

  resize();

  // force the shader to compile now so any GLSL error surfaces in the loader
  // instead of silently stalling on "INITIALIZING"
  try {
    renderer.compile(scene, camera);
    renderer.render(scene, camera);
  } catch (err) {
    fail('shader/render: ' + (err && err.message ? err.message : err));
    throw err;
  }

  setStatus('READY');
  loaderEl.classList.add('gone');
  animate();
}

init().catch((e) => fail(e.message || String(e)));
</script>
</body>
</html>
