const root = document.getElementById('hero-root');
const loaderEl = document.getElementById('loader');
const video = document.getElementById('bg-video');
const setStatus = (s) => { loaderEl.textContent = s; };
function fail(msg){ setStatus('ERR · '+msg); loaderEl.style.color='#ff6688'; console.error(msg); }

const VIDEO_URL = 'https://cdn.jwplayer.com/videos/JZHkQjZc-qgCdanU1.mp4';
const MAX_DROPS = 16;
const isMobile = window.matchMedia('(max-width:760px)').matches;
if (typeof THREE === 'undefined'){ fail('three.js failed to load'); throw new Error('no THREE'); }

// the effect canvas covers the right 66.67% on desktop, full width on mobile
function fxFraction() { return isMobile ? 1.0 : (2.0/3.0); }
function fxSize() {
  const r = root.getBoundingClientRect();
  return { w: Math.max(2, Math.floor((r.width||1280) * fxFraction())), h: Math.max(2, Math.floor(r.height||720)) };
}

// =====================================================================
// PART 1 — BACKGROUND FLUTED-RIPPLE over the right 66.67% of the video
// =====================================================================
async function initBackground() {
  setStatus('LOADING VIDEO');
  try {
    video.crossOrigin = 'anonymous';   // REQUIRED before src so the fetch is CORS-mode
    video.src = VIDEO_URL;
    video.addEventListener('error', () => console.warn('video element error event'));
    const ensurePlay = () => { try { const p=video.play(); if(p&&p.catch)p.catch(()=>{}); } catch(e){} };
    ensurePlay();
    root.addEventListener('pointerdown', ensurePlay, { once:true });
    root.addEventListener('pointermove', ensurePlay, { once:true });
    await new Promise((resolve) => {
      if (video.videoWidth > 0) return resolve();
      video.addEventListener('loadeddata', resolve, { once:true });
      video.addEventListener('canplay', resolve, { once:true });
      setTimeout(resolve, 3000);
    });
  } catch(e){ console.warn('video setup issue, continuing', e); }

  setStatus('BUILDING SCENE');

  let { w: CW, h: CH } = fxSize();
  const canvas = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true, powerPreference:'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);
  renderer.setSize(CW, CH, false);

  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);

  const videoTex = new THREE.VideoTexture(video);
  videoTex.minFilter = THREE.LinearFilter; videoTex.magFilter = THREE.LinearFilter;
  const vidAspect = (video.videoWidth||16)/(video.videoHeight||9);

  const drops = [];
  for (let i=0;i<MAX_DROPS;i++) drops.push(new THREE.Vector3(0,0,-1));
  let dropIdx = 0;

  const uniforms = {
    uVideo:{value:videoTex}, uResolution:{value:new THREE.Vector2(CW,CH)},
    uVideoAspect:{value:vidAspect}, uTime:{value:0}, uDrops:{value:drops},
    uDispScale:{value: isMobile ? 0.45 : 1.0},
    uFxFraction:{value: fxFraction()},   // how wide the canvas is vs full video
  };

  const material = new THREE.ShaderMaterial({
    uniforms, transparent:true,
    vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.0); }`,
    fragmentShader: `
      precision highp float;
      #define MAX_DROPS ${MAX_DROPS}
      uniform sampler2D uVideo;
      uniform vec2  uResolution;
      uniform float uVideoAspect;
      uniform float uTime;
      uniform vec3  uDrops[MAX_DROPS];
      uniform float uDispScale;
      uniform float uFxFraction;
      varying vec2  vUv;

      float contA; vec2 aspV;

      // cover-fit across the FULL hero width, then sample only the right slice
      // so the effect lines up pixel-for-pixel with the clean video beneath it
      vec2 coverUv(vec2 uv) {
        // map this canvas's uv.x (0..1 over the LEFT fraction) back into full
        // video uv space: the canvas starts at x = 0
        float fullX = uv.x * uFxFraction;
        vec2 p = vec2(fullX, uv.y);
        float fullAspect = contA / uFxFraction;          // full hero aspect
        float vidA = uVideoAspect;
        vec2 s = vec2(1.0);
        if (fullAspect > vidA) s.y = vidA / fullAspect;
        else                   s.x = fullAspect / vidA;
        return (p - 0.5) * s + 0.5;
      }
      vec3 sampleVideo(vec2 uv, vec2 disp, float chroma) {
        vec2 b = coverUv(uv + disp);
        vec2 ch = disp * 0.14 * chroma;
        return vec3(
          texture2D(uVideo, coverUv(uv + disp + ch)).r,
          texture2D(uVideo, b).g,
          texture2D(uVideo, coverUv(uv + disp - ch)).b
        );
      }
      vec2 verticalSheet(float x, float freq, float phase) {
        float c = x*freq+phase; return vec2(cos(c)*freq, sin(c));
      }

      void main() {
        contA = uResolution.x / uResolution.y;
        aspV  = vec2(contA, 1.0);
        vec2 uv = vUv;
        float t = uTime;

        float sigma=0.11, vSlide=0.0, bendX=0.0, act=0.0;
        for (int i=0;i<MAX_DROPS;i++){
          vec3 drop=uDrops[i]; float birth=drop.z; float age=t-birth;
          if (birth>=0.0 && age>=0.0 && age<2.8){
            vec2 rv=uv-drop.xy; float d2=dot(rv*aspV,rv*aspV);
            float g=exp(-d2/(2.0*sigma*sigma))*exp(-age*1.3);
            vSlide+=g; bendX+=-rv.x*contA*g*0.9; act+=g;
          }
        }
        float x = uv.x*contA;
        float vpos1 = uv.y*0.6 + t*0.12 + vSlide*0.8;
        float vpos2 = uv.y*0.4 - t*0.09 + vSlide*0.5;
        vec2 s1 = verticalSheet(x, 16.0, t*0.55 + vpos1*1.2);
        vec2 s2 = verticalSheet(x, 27.0, -t*0.42 + vpos2*1.0);
        float disp = s1.x*0.0013 + s2.x*0.0008 + bendX*0.06;
        disp += cos(x*1.4 + t*0.25)*1.4*0.004;
        float ridge = s1.y*0.6 + s2.y*0.4;
        float chroma = 1.0 + act*1.6;

        // ---- EDGE-OF-GLASS GRADIENT --------------------------------------
        // The seam (right edge of this canvas, uv.x = 1.0) is the physical
        // edge of the glass sheet. Refraction ramps to ZERO right at the seam
        // so the video is continuous and the boundary is clean/defined, then
        // increases toward the left edge of the sheet.
        float edgeRamp = smoothstep(1.0, 0.86, uv.x);   // 0 at seam -> 1 inward
        disp  *= edgeRamp;
        ridge *= edgeRamp;
        chroma = 1.0 + (chroma - 1.0) * edgeRamp;

        vec3 col = sampleVideo(uv, vec2(disp,0.0)*uDispScale, chroma);

        // ---- subtle all-over frosting -------------------------------------
        // a light vertical blur across the whole sheet (scaled by edgeRamp so
        // it fades out at the seam) gives the glass body a touch of softness,
        // separating it from the crisp clean video beside it.
        {
          float fr = 0.004 * edgeRamp;
          vec3 fcol = col;
          fcol += sampleVideo(uv, vec2(disp,  fr)     *uDispScale, chroma);
          fcol += sampleVideo(uv, vec2(disp, -fr)     *uDispScale, chroma);
          fcol /= 3.0;
          col = mix(col, fcol, 0.14 * edgeRamp);   // lighter frosting
        }
        // very faint cool wash only (lower opacity, clearer glass)
        col = mix(col, col * vec3(0.96, 0.98, 1.03) + vec3(0.006,0.010,0.014),
                  0.10 * edgeRamp);

        float crest  = smoothstep(0.55,1.0,ridge);
        float valley = smoothstep(0.55,1.0,-ridge);
        col += vec3(0.50,0.74,1.05)*crest*0.08*edgeRamp;
        col -= vec3(0.08,0.10,0.16)*valley*0.30*edgeRamp;
        float bend = clamp(abs(disp)*16.0,0.0,1.0);
        col += vec3(0.45,0.72,1.0)*bend*0.06;

        // ---- CLEAN EDGE, GRADIENT LIGHT ----------------------------------
        // The seam cut stays hard (clean boundary), but the edge HIGHLIGHT is a
        // soft gradient that builds gradually toward the seam across a wide
        // band — so there's no "line", just a gentle brightening into the edge.
        float seam = uv.x;                                   // 0 left .. 1 seam
        float edgeHi = smoothstep(0.55, 1.0, seam);          // wide, gradual
        edgeHi = pow(edgeHi, 1.6);                            // eases in slowly, rises near edge
        col += vec3(0.50, 0.74, 1.05) * edgeHi * 0.10;

        gl_FragColor = vec4(col, 1.0);
      }
    `,
  });
  scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), material));

  // cursor → vertical slide (mapped into the effect canvas region)
  let last={x:.5,y:.5,set:false};
  function spawnDrop(ux,uy){ drops[dropIdx].set(ux,uy,uniforms.uTime.value); dropIdx=(dropIdx+1)%MAX_DROPS; }
  root.addEventListener('pointermove', (e)=>{
    const r = canvas.getBoundingClientRect();
    const ux=(e.clientX-r.left)/r.width, uy=1.0-(e.clientY-r.top)/r.height;
    if (ux<-0.1||ux>1.1) return;
    if (!last.set){ last={x:ux,y:uy,set:true}; spawnDrop(ux,uy); return; }
    if (Math.hypot(ux-last.x,uy-last.y)>0.015){ spawnDrop(ux,uy); last.x=ux; last.y=uy; }
  });
  root.addEventListener('pointerdown', (e)=>{
    const r = canvas.getBoundingClientRect();
    const ux=(e.clientX-r.left)/r.width, uy=1.0-(e.clientY-r.top)/r.height;
    if (ux>=-0.1 && ux<=1.1) spawnDrop(ux,uy);
  });

  function resize(){
    const { w,h } = fxSize();
    renderer.setSize(w,h,false);
    uniforms.uResolution.value.set(w,h);
    uniforms.uFxFraction.value = fxFraction();
  }
  if (typeof ResizeObserver!=='undefined') new ResizeObserver(resize).observe(root);
  window.addEventListener('resize', resize);

  // Only hide the effect if WebGL genuinely cannot use the video as a texture
  // (a real security error on render). We do NOT judge by pixel color — the
  // source video has dark regions, and color-sniffing produced false hides.
  let textureOK = true;
  const clock = new THREE.Clock();
  function animate(){
    uniforms.uTime.value = clock.getElapsedTime();
    if (textureOK) {
      try { renderer.render(scene,camera); }
      catch(err){
        textureOK=false; canvas.style.display='none';
        console.warn('video texture blocked by CORS; clean video shows', err);
      }
    }
    requestAnimationFrame(animate);
  }
  resize();
  try { renderer.compile(scene,camera); renderer.render(scene,camera); }
  catch(err){ fail('bg shader: '+(err&&err.message?err.message:err)); throw err; }
  animate();
}

// =====================================================================
// PART 2 — GLASS "EDGE" (Bitter italic, automatic, #0094c2 tint)
// =====================================================================

// ===================================================================
// CHROME "the Edge" — REAL 3D extruded geometry with a metallic material
// reflecting a procedural environment (PMREM). This is the genuine three.js
// chrome approach: ExtrudeGeometry from the font glyph outlines +
// MeshStandardMaterial(metalness 1, roughness ~0) + envMap.
// ===================================================================
// ===================================================================
// GLASS "the Edge" — extruded from the supplied SVG, rendered as clear
// refractive glass with chromatic dispersion + iridescence (matches the
// "glass" reference). Reflects/refracts a procedural studio environment.
// ===================================================================

// --- tiny SVG path "d" parser → array of polygon contours (sampled) ---------
function svgPathToContours(d, steps){
  steps = steps || 10;
  const contours = []; let pts = null;
  let x=0,y=0, sx=0,sy=0;          // current point, subpath start
  let i=0; const n=d.length;
  function num(){
    // read a number (handles signs, decimals, exponents, comma/space sep)
    while(i<n && /[\s,]/.test(d[i])) i++;
    let s=i;
    if(d[i]==='+'||d[i]==='-') i++;
    while(i<n && /[0-9.eE+\-]/.test(d[i])){
      // stop on a sign that starts a new number (not exponent)
      if((d[i]==='+'||d[i]==='-') && i>s && !/[eE]/.test(d[i-1])) break;
      i++;
    }
    return parseFloat(d.slice(s,i));
  }
  function cubic(x1,y1,x2,y2,ex,ey){
    for(let k=1;k<=steps;k++){const t=k/steps,mt=1-t;
      const px=mt*mt*mt*x+3*mt*mt*t*x1+3*mt*t*t*x2+t*t*t*ex;
      const py=mt*mt*mt*y+3*mt*mt*t*y1+3*mt*t*t*y2+t*t*t*ey;
      pts.push([px,-py]);}
    x=ex; y=ey;
  }
  function quad(x1,y1,ex,ey){
    for(let k=1;k<=steps;k++){const t=k/steps,mt=1-t;
      const px=mt*mt*x+2*mt*t*x1+t*t*ex;
      const py=mt*mt*y+2*mt*t*y1+t*t*ey;
      pts.push([px,-py]);}
    x=ex; y=ey;
  }
  let cmd='';
  while(i<n){
    while(i<n && /[\s,]/.test(d[i])) i++;
    if(i>=n) break;
    const c=d[i];
    if(/[a-zA-Z]/.test(c)){ cmd=c; i++; }
    const rel = (cmd===cmd.toLowerCase());
    const C = cmd.toUpperCase();
    if(C==='M'){
      let nx=num(), ny=num(); if(rel){nx+=x;ny+=y;}
      if(pts && pts.length>2) contours.push(pts);
      pts=[]; x=nx;y=ny;sx=x;sy=y; pts.push([x,-y]); cmd = rel?'l':'L';
    } else if(C==='L'){
      let nx=num(), ny=num(); if(rel){nx+=x;ny+=y;} x=nx;y=ny; pts.push([x,-y]);
    } else if(C==='H'){
      let nx=num(); if(rel) nx+=x; x=nx; pts.push([x,-y]);
    } else if(C==='V'){
      let ny=num(); if(rel) ny+=y; y=ny; pts.push([x,-y]);
    } else if(C==='C'){
      let x1=num(),y1=num(),x2=num(),y2=num(),ex=num(),ey=num();
      if(rel){x1+=x;y1+=y;x2+=x;y2+=y;ex+=x;ey+=y;} cubic(x1,y1,x2,y2,ex,ey);
    } else if(C==='S'){
      let x2=num(),y2=num(),ex=num(),ey=num();
      if(rel){x2+=x;y2+=y;ex+=x;ey+=y;} cubic(x,y,x2,y2,ex,ey);
    } else if(C==='Q'){
      let x1=num(),y1=num(),ex=num(),ey=num();
      if(rel){x1+=x;y1+=y;ex+=x;ey+=y;} quad(x1,y1,ex,ey);
    } else if(C==='T'){
      let ex=num(),ey=num(); if(rel){ex+=x;ey+=y;} quad(x,y,ex,ey);
    } else if(C==='Z'){
      if(pts && pts.length>2) contours.push(pts);
      pts=null; x=sx;y=sy;
    } else { num(); } // skip unknown
  }
  if(pts && pts.length>2) contours.push(pts);
  return contours;
}

function dataUriToAB(uri){
  const b=atob(uri.split(',')[1]); const u=new Uint8Array(b.length);
  for(let i=0;i<b.length;i++) u[i]=b.charCodeAt(i); return u.buffer;
}

// === GLASS "the Edge" =======================================================
// Render the word to a same-origin canvas texture and refract it through the
// SAME vertical glass sheets as the background — tinted #0094c2, running
// automatically (no cursor needed).
async function initEdgeGlass(){
  try {
    if (document.fonts && document.fonts.load){
      await document.fonts.load('italic 600 90px "BitterEmbed"');
      await document.fonts.ready;
    }
  } catch(e){}

  const edgeCanvas = document.getElementById('edge');
  const headline = document.querySelector('.headline');
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const word = 'the Edge';
  const measure = document.createElement('canvas').getContext('2d');

  const renderer = new THREE.WebGLRenderer({ canvas:edgeCanvas, antialias:true, alpha:true, premultipliedAlpha:false });
  renderer.setPixelRatio(dpr);
  renderer.setClearColor(0x000000,0);

  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);

  const srcCanvas = document.createElement('canvas');
  const sctx = srcCanvas.getContext('2d');
  const wordTex = new THREE.CanvasTexture(srcCanvas);
  wordTex.minFilter = THREE.LinearFilter; wordTex.magFilter = THREE.LinearFilter;

  const uniforms = {
    uWord:{value:wordTex},
    uResolution:{value:new THREE.Vector2(2,2)},
    uTime:{value:0},
    uTint:{value:new THREE.Color(0x0094c2)},
  };

  // (re)compute size + redraw the word texture from the CURRENT headline font
  // size, so "the Edge" always matches "Building Beyond" as the viewport (and
  // its clamp()-based font-size) changes.
  let lastFs = -1, lastW = 0;
  function rebuild(){
    const fsPx = parseFloat(getComputedStyle(headline).fontSize);
    const headW = headline.clientWidth;
    // skip the expensive redraw when nothing relevant changed
    if (fsPx === lastFs && headW === lastW) return;
    lastFs = fsPx; lastW = headW;

    const glyphPx = fsPx * 1.02;
    const fontSpec = 'italic 600 ' + glyphPx + 'px "BitterEmbed","Bitter",Georgia,serif';
    measure.font = fontSpec;
    const m = measure.measureText(word);
    const ascent  = m.actualBoundingBoxAscent  || glyphPx*0.72;
    const descent = m.actualBoundingBoxDescent || glyphPx*0.24;
    const padX = glyphPx*0.20, padY = glyphPx*0.18;
    const cssW = Math.ceil(m.width + padX*2);
    const cssH = Math.ceil(ascent + descent + padY*2);

    edgeCanvas.style.width = cssW+'px';
    edgeCanvas.style.height = cssH+'px';
    edgeCanvas.style.marginBottom = (-(descent+padY))+'px';
    edgeCanvas.style.marginLeft = (-padX*0.5)+'px';
    edgeCanvas.style.marginRight = (-padX*0.5)+'px';

    const TW = Math.max(2, Math.floor(cssW*dpr));
    const TH = Math.max(2, Math.floor(cssH*dpr));
    srcCanvas.width = TW; srcCanvas.height = TH;
    sctx.setTransform(1,0,0,1,0,0);
    sctx.clearRect(0,0,TW,TH);
    sctx.scale(dpr,dpr);
    sctx.fillStyle = '#ffffff';
    sctx.font = fontSpec;
    sctx.textBaseline = 'alphabetic';
    sctx.fillText(word, padX, padY+ascent);
    wordTex.needsUpdate = true;

    renderer.setSize(cssW,cssH,false);
    uniforms.uResolution.value.set(TW,TH);
  }
  rebuild();

  const material = new THREE.ShaderMaterial({
    transparent:true, uniforms,
    vertexShader:'varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.0); }',
    fragmentShader: [
'precision highp float;',
'uniform sampler2D uWord;',
'uniform vec2 uResolution;',
'uniform float uTime;',
'uniform vec3 uTint;',
'varying vec2 vUv;',
'float contA;',
'void main(){',
'  contA = uResolution.x/uResolution.y;',
'  vec2 uv = vUv; float t = uTime;',
'  float x = uv.x*contA;',
'  // ONE broad refraction across the WHOLE word (low frequency) so "the Edge"',
'  // reads as a single glass object, not per-letter flutes.',
'  float sweep = sin(x*1.6 - t*0.7 + uv.y*0.4);',
'  float disp = cos(x*1.6 - t*0.7) * 0.0016;',
'  vec2 d = vec2(disp, 0.0);',
'  float alpha = texture2D(uWord, uv + d).a;',
'  if (alpha < 0.01){ gl_FragColor = vec4(0.0); return; }',
'  // body: solid blue with a clearer moving sheen, kept off pure white',
'  vec3 light = mix(uTint, vec3(0.55,0.92,1.0), 0.6);',
'  float hi = smoothstep(0.4, 1.0, sweep);',
'  vec3 col = mix(uTint, light, hi * 0.42);',
'  float lo = smoothstep(0.45, 1.0, -sweep);',
'  col = mix(col, uTint*0.78, lo * 0.28);',
'  gl_FragColor = vec4(col, alpha);',
'}'
].join('\n'),
  });
  scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), material));

  const clock = new THREE.Clock();
  function animate(){
    rebuild();   // keep locked to "Building Beyond" every frame (cheap; redraws only on change)
    uniforms.uTime.value = clock.getElapsedTime();
    renderer.render(scene,camera);
    requestAnimationFrame(animate);
  }
  try { renderer.compile(scene,camera); renderer.render(scene,camera); }
  catch(err){ fail('edge glass: '+(err&&err.message?err.message:err)); throw err; }
  animate();
}

(async function(){
  await initBackground();
  await initEdgeGlass();
  setStatus('READY');
  loaderEl.classList.add('gone');
})().catch((e)=>fail(e.message||String(e)));
</script>
