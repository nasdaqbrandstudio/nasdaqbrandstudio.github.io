<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Building Beyond the Edge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; font-family:'Inter',system-ui,sans-serif; }
  #hero-root { position:relative; width:100%; height:100%; min-height:100%; }

  /* clean video fills the WHOLE frame underneath everything */
  #bg-video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }

  /* the fluted-ripple effect canvas overlays only the RIGHT 66.67%.
     a soft feather on its left edge blends it into the clean video. */
  #c {
    position:absolute; top:0; left:0; bottom:0;
    width:66.6667%; height:100%; z-index:1;
    -webkit-mask-image: linear-gradient(90deg, #000 0%, #000 90%, transparent 100%);
            mask-image: linear-gradient(90deg, #000 0%, #000 90%, transparent 100%);
  }

  .scrim {
    position:absolute; inset:0; z-index:2; pointer-events:none;
    background:
      linear-gradient(90deg, rgba(0,0,0,0.66) 0%, rgba(0,0,0,0.34) 34%, rgba(0,0,0,0.0) 62%);
  }

  .content {
    position:absolute; z-index:3; pointer-events:none;
    left:0; top:0; bottom:0;
    display:flex; flex-direction:column; align-items:flex-start; justify-content:center;
    text-align:left;
    padding-left:clamp(28px,7vw,120px); padding-right:clamp(24px,5vw,80px);
    max-width:min(900px,92%);
  }
  .headline {
    margin:0 0 18px 0; font-weight:600;
    font-size:clamp(34px,5.6vw,76px); line-height:1.04; letter-spacing:-0.02em;
    color:#f4f6fb; text-shadow:0 2px 30px rgba(0,0,0,0.35);
  }
  /* glass "Edge" canvas sits inline on the headline baseline */
  .edge-word {
    font-family:'Bitter', Georgia, serif;
    font-style:italic; font-weight:600;     /* same weight as the headline */
    color:#0094c2;
  }
  .headline .nowrap { white-space:nowrap; }   /* keep "the Edge" together; wraps as a unit */
  .content .sub { margin:0 0 16px 0; font-weight:500; font-size:clamp(16px,1.9vw,23px); line-height:1.35; letter-spacing:-0.005em; color:#cdd6e8; }
  .content .body { margin:0; font-weight:400; font-size:clamp(13px,1.25vw,16px); line-height:1.6; color:rgba(205,214,232,0.78); max-width:560px; }
  .content > * { opacity:0; transform:translateY(14px); animation:rise 1.2s cubic-bezier(0.2,0.7,0.2,1) forwards; }
  .headline { animation-delay:0.35s; } .content .sub { animation-delay:0.55s; } .content .body { animation-delay:0.72s; }
  @keyframes rise { to { opacity:1; transform:translateY(0); } }

  .loader {
    position:absolute; inset:0; background:#000; z-index:9;
    display:flex; align-items:center; justify-content:center; transition:opacity 0.8s;
    font-size:10px; letter-spacing:0.32em; color:#3a4050; font-weight:500;
    padding:0 24px; text-align:center; line-height:1.6;
  }
  .loader.gone { opacity:0; pointer-events:none; }

  /* mobile: effect spans full width, kept subtler via uDispScale in JS */
  @media (max-width:760px) {
    #c { width:100%; -webkit-mask-image:none; mask-image:none; }
    .headline { font-size:clamp(32px,10vw,54px); }
  }
</style>
</head>
<body>
<div id="hero-root">
  <video id="bg-video" crossorigin="anonymous" muted loop playsinline autoplay preload="auto"></video>
  <canvas id="c"></canvas>
  <div class="scrim"></div>
  <div class="content">
    <h1 class="headline">Building Beyond <span class="nowrap"><span class="edge-word">the&nbsp;Edge</span></span></h1>
    <p class="sub">The edge isn&rsquo;t the end &ndash; it&rsquo;s where building begins.</p>
    <p class="body">As AI and other innovative technologies power a new era of economy where infrastructure, intelligence and capital converge, Nasdaq exists to help builders push beyond the edge and enable progress to scale.</p>
  </div>
  <div class="loader" id="loader">INITIALIZING</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const root = document.getElementById('hero-root');
const loaderEl = document.getElementById('loader');
const video = document.getElementById('bg-video');
const setStatus = (s) => { loaderEl.textContent = s; };
function fail(msg){ setStatus('ERR · '+msg); loaderEl.style.color='#ff6688'; console.error(msg); }

const VIDEO_URL = 'https://cdn.jwplayer.com/videos/JZHkQjZc-qgCdanU1.mp4';
const MAX_DROPS = 16;
const isMobile = window.matchMedia('(max-width:760px)').matches;
if (typeof THREE === 'undefined'){ fail('three.js failed to load'); throw new Error('no THREE'); }

// the effect canvas covers the right 66.67% on desktop, full width on mobile
function fxFraction() { return isMobile ? 1.0 : (2.0/3.0); }
function fxSize() {
  const r = root.getBoundingClientRect();
  return { w: Math.max(2, Math.floor((r.width||1280) * fxFraction())), h: Math.max(2, Math.floor(r.height||720)) };
}

// =====================================================================
// PART 1 — BACKGROUND FLUTED-RIPPLE over the right 66.67% of the video
// =====================================================================
async function initBackground() {
  setStatus('LOADING VIDEO');
  try {
    video.crossOrigin = 'anonymous';   // REQUIRED before src so the fetch is CORS-mode
    video.src = VIDEO_URL;
    video.addEventListener('error', () => console.warn('video element error event'));
    const ensurePlay = () => { try { const p=video.play(); if(p&&p.catch)p.catch(()=>{}); } catch(e){} };
    ensurePlay();
    root.addEventListener('pointerdown', ensurePlay, { once:true });
    root.addEventListener('pointermove', ensurePlay, { once:true });
    await new Promise((resolve) => {
      if (video.videoWidth > 0) return resolve();
      video.addEventListener('loadeddata', resolve, { once:true });
      video.addEventListener('canplay', resolve, { once:true });
      setTimeout(resolve, 3000);
    });
  } catch(e){ console.warn('video setup issue, continuing', e); }

  setStatus('BUILDING SCENE');

  let { w: CW, h: CH } = fxSize();
  const canvas = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true, powerPreference:'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);
  renderer.setSize(CW, CH, false);

  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);

  const videoTex = new THREE.VideoTexture(video);
  videoTex.minFilter = THREE.LinearFilter; videoTex.magFilter = THREE.LinearFilter;
  const vidAspect = (video.videoWidth||16)/(video.videoHeight||9);

  const drops = [];
  for (let i=0;i<MAX_DROPS;i++) drops.push(new THREE.Vector3(0,0,-1));
  let dropIdx = 0;

  const uniforms = {
    uVideo:{value:videoTex}, uResolution:{value:new THREE.Vector2(CW,CH)},
    uVideoAspect:{value:vidAspect}, uTime:{value:0}, uDrops:{value:drops},
    uDispScale:{value: isMobile ? 0.45 : 1.0},
    uFxFraction:{value: fxFraction()},   // how wide the canvas is vs full video
  };

  const material = new THREE.ShaderMaterial({
    uniforms, transparent:true,
    vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.0); }`,
    fragmentShader: `
      precision highp float;
      #define MAX_DROPS ${MAX_DROPS}
      uniform sampler2D uVideo;
      uniform vec2  uResolution;
      uniform float uVideoAspect;
      uniform float uTime;
      uniform vec3  uDrops[MAX_DROPS];
      uniform float uDispScale;
      uniform float uFxFraction;
      varying vec2  vUv;

      float contA; vec2 aspV;

      // cover-fit across the FULL hero width, then sample only the right slice
      // so the effect lines up pixel-for-pixel with the clean video beneath it
      vec2 coverUv(vec2 uv) {
        // map this canvas's uv.x (0..1 over the LEFT fraction) back into full
        // video uv space: the canvas starts at x = 0
        float fullX = uv.x * uFxFraction;
        vec2 p = vec2(fullX, uv.y);
        float fullAspect = contA / uFxFraction;          // full hero aspect
        float vidA = uVideoAspect;
        vec2 s = vec2(1.0);
        if (fullAspect > vidA) s.y = vidA / fullAspect;
        else                   s.x = fullAspect / vidA;
        return (p - 0.5) * s + 0.5;
      }
      vec3 sampleVideo(vec2 uv, vec2 disp, float chroma) {
        vec2 b = coverUv(uv + disp);
        vec2 ch = disp * 0.14 * chroma;
        return vec3(
          texture2D(uVideo, coverUv(uv + disp + ch)).r,
          texture2D(uVideo, b).g,
          texture2D(uVideo, coverUv(uv + disp - ch)).b
        );
      }
      vec2 verticalSheet(float x, float freq, float phase) {
        float c = x*freq+phase; return vec2(cos(c)*freq, sin(c));
      }

      void main() {
        contA = uResolution.x / uResolution.y;
        aspV  = vec2(contA, 1.0);
        vec2 uv = vUv;
        float t = uTime;

        float sigma=0.11, vSlide=0.0, bendX=0.0, act=0.0;
        for (int i=0;i<MAX_DROPS;i++){
          vec3 drop=uDrops[i]; float birth=drop.z; float age=t-birth;
          if (birth>=0.0 && age>=0.0 && age<2.8){
            vec2 rv=uv-drop.xy; float d2=dot(rv*aspV,rv*aspV);
            float g=exp(-d2/(2.0*sigma*sigma))*exp(-age*1.3);
            vSlide+=g; bendX+=-rv.x*contA*g*0.9; act+=g;
          }
        }
        float x = uv.x*contA;
        float vpos1 = uv.y*0.6 + t*0.12 + vSlide*0.8;
        float vpos2 = uv.y*0.4 - t*0.09 + vSlide*0.5;
        vec2 s1 = verticalSheet(x, 16.0, t*0.55 + vpos1*1.2);
        vec2 s2 = verticalSheet(x, 27.0, -t*0.42 + vpos2*1.0);
        float disp = s1.x*0.0019 + s2.x*0.0012 + bendX*0.06;
        disp += cos(x*1.4 + t*0.25)*1.4*0.006;
        float ridge = s1.y*0.6 + s2.y*0.4;
        float chroma = 1.0 + act*1.6;

        vec3 col = sampleVideo(uv, vec2(disp,0.0)*uDispScale, chroma);
        float crest  = smoothstep(0.55,1.0,ridge);
        float valley = smoothstep(0.55,1.0,-ridge);
        col += vec3(0.50,0.74,1.05)*crest*0.13;
        col -= vec3(0.08,0.10,0.16)*valley*0.45;
        float bend = clamp(abs(disp)*16.0,0.0,1.0);
        col += vec3(0.45,0.72,1.0)*bend*0.10;

        gl_FragColor = vec4(col, 1.0);
      }
    `,
  });
  scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), material));

  // cursor → vertical slide (mapped into the effect canvas region)
  let last={x:.5,y:.5,set:false};
  function spawnDrop(ux,uy){ drops[dropIdx].set(ux,uy,uniforms.uTime.value); dropIdx=(dropIdx+1)%MAX_DROPS; }
  root.addEventListener('pointermove', (e)=>{
    const r = canvas.getBoundingClientRect();
    const ux=(e.clientX-r.left)/r.width, uy=1.0-(e.clientY-r.top)/r.height;
    if (ux<-0.1||ux>1.1) return;
    if (!last.set){ last={x:ux,y:uy,set:true}; spawnDrop(ux,uy); return; }
    if (Math.hypot(ux-last.x,uy-last.y)>0.015){ spawnDrop(ux,uy); last.x=ux; last.y=uy; }
  });
  root.addEventListener('pointerdown', (e)=>{
    const r = canvas.getBoundingClientRect();
    const ux=(e.clientX-r.left)/r.width, uy=1.0-(e.clientY-r.top)/r.height;
    if (ux>=-0.1 && ux<=1.1) spawnDrop(ux,uy);
  });

  function resize(){
    const { w,h } = fxSize();
    renderer.setSize(w,h,false);
    uniforms.uResolution.value.set(w,h);
    uniforms.uFxFraction.value = fxFraction();
  }
  if (typeof ResizeObserver!=='undefined') new ResizeObserver(resize).observe(root);
  window.addEventListener('resize', resize);

  // Only hide the effect if WebGL genuinely cannot use the video as a texture
  // (a real security error on render). We do NOT judge by pixel color — the
  // source video has dark regions, and color-sniffing produced false hides.
  let textureOK = true;
  const clock = new THREE.Clock();
  function animate(){
    uniforms.uTime.value = clock.getElapsedTime();
    if (textureOK) {
      try { renderer.render(scene,camera); }
      catch(err){
        textureOK=false; canvas.style.display='none';
        console.warn('video texture blocked by CORS; clean video shows', err);
      }
    }
    requestAnimationFrame(animate);
  }
  resize();
  try { renderer.compile(scene,camera); renderer.render(scene,camera); }
  catch(err){ fail('bg shader: '+(err&&err.message?err.message:err)); throw err; }
  animate();
}

// =====================================================================
// PART 2 — GLASS "EDGE" (Bitter italic, automatic, #0094c2 tint)
// =====================================================================
(async function(){
  await initBackground();
  setStatus('READY');
  loaderEl.classList.add('gone');
})().catch((e)=>fail(e.message||String(e)));
</script>
</body>
</html>
