<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Follow @Nasdaq on X</title>
<style>
  @font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url('fonts/inter-latin-400-normal.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 600;
    font-display: swap;
    src: url('fonts/inter-latin-600-normal.woff2') format('woff2');
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; overflow-x: hidden; }

  .ticker {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    height: 64px;
    min-width: 295px;
    padding: 0 16px;
    background: #08062A;
    border-top: 1px solid #222E4F;
    border-bottom: 1px solid #222E4F;
    font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .ticker__live {
    padding: 2px 10px;
    border-radius: 4px;
    background: #0092BC;
    color: #FFFFFF;
    font-size: 12px;
    font-weight: 600;
    line-height: 20px;
    letter-spacing: .1em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .ticker__text {
    color: #FFFFFF;
    font-size: 16px;
    font-weight: 400;
    line-height: 24px;
  }

  .ticker__text a { color: inherit; text-decoration: none; }
  .ticker__text a:hover { text-decoration: underline; text-underline-offset: 3px; }
</style>
</head>
<body>
<div class="ticker">
  <span class="ticker__live">Live</span>
  <span class="ticker__text">Follow <a href="https://x.com/Nasdaq" target="_blank" rel="noopener">@Nasdaq on X.com</a></span>
</div>
</body>
</html>
