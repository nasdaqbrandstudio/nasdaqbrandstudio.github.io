<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Market News</title>
<style>
  @font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url('fonts/inter-latin-400-normal.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 600;
    font-display: swap;
    src: url('fonts/inter-latin-600-normal.woff2') format('woff2');
  }

  :root {
    --bg: #08062A;
    --border: #222E4F;
    --divider: #385290;
    --text: #FFFFFF;
    --eyebrow: #00EB80;
    --time: #E6E9F5;
    --font: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    --h: 64px;
  }
  .ticker[data-theme="light"] {
    --bg: #FFFFFF;
    --border: #E4F2FF;
    --divider: #E4F2FF;
    --text: #171717;
    --eyebrow: #026830;
    --time: #5B6470;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  .ticker {
    font-family: var(--font);
    display: flex;
    align-items: stretch;
    height: var(--h);
    width: 100%;
    background: var(--bg);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .ticker__label {
    display: none;
    align-items: center;
    flex: 0 0 auto;
    padding: 0 16px;
    font-size: 16px;
    font-weight: 600;
    line-height: 24px;
    color: var(--text);
    white-space: nowrap;
  }
  .ticker__label.on { display: flex; }
  .ticker__labelsep {
    display: none;
    flex: 0 0 auto;
    width: 2px;
    height: 32px;
    align-self: center;
    background: var(--divider);
  }
  .ticker__labelsep.on { display: block; }

  .ticker__viewport {
    position: relative;
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    overflow: hidden;
  }
  .ticker__viewport::before,
  .ticker__viewport::after {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    width: 40px;
    z-index: 2;
    pointer-events: none;
  }
  .ticker__viewport::before { left: 0; background: linear-gradient(90deg, var(--bg), transparent); }
  .ticker__viewport::after { right: 0; background: linear-gradient(270deg, var(--bg), transparent); }

  .ticker__track {
    display: flex;
    flex-wrap: nowrap;
    will-change: transform;
    animation: scroll linear infinite;
  }
  .ticker.hoverable:hover .ticker__track { animation-play-state: paused; }
  .ticker__group { display: flex; flex-wrap: nowrap; }
  @keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  .item {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    height: 32px;
    padding: 4px 14px;
    white-space: nowrap;
    text-decoration: none;
  }
  a.item:hover .item__headline { text-decoration: underline; text-underline-offset: 3px; }
  .item__cat {
    font-size: 12px;
    font-weight: 600;
    line-height: 24px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--eyebrow);
  }
  .item__headline { font-size: 16px; font-weight: 400; line-height: 24px; color: var(--text); }
  .item__time { font-size: 14px; font-weight: 400; line-height: 24px; color: var(--time); font-variant-numeric: tabular-nums; }

  .sep {
    flex: 0 0 auto;
    width: 2px;
    height: 32px;
    background: var(--divider);
  }

  @media (prefers-reduced-motion: reduce) {
    .ticker__track { animation: none !important; }
    .ticker__viewport { overflow-x: auto; scrollbar-width: none; }
    .ticker__viewport::-webkit-scrollbar { display: none; }
    .ticker__track > .ticker__group ~ .ticker__group { display: none; }
  }
</style>
</head>
<body>
<div class="ticker hoverable" id="ticker" role="region" aria-label="Latest news">
  <span class="ticker__label" id="label"></span>
  <span class="ticker__labelsep" id="labelSep" aria-hidden="true"></span>
  <div class="ticker__viewport" id="viewport">
    <div class="ticker__track" id="track"></div>
  </div>
</div>
<script>
(function () {
  "use strict";

  var config = {
    theme: "auto",
    label: "",
    speed: 35,
    direction: "left",
    pauseOnHover: true
  };

  var items = [
    { headline: "Extra! Extra! APEX launches as the world's largest IPO." }
  ];

  var ticker = document.getElementById("ticker");
  var viewport = document.getElementById("viewport");
  var track = document.getElementById("track");
  var label = document.getElementById("label");
  var labelSep = document.getElementById("labelSep");
  var darkScheme = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;

  function escapeHtml(value) {
    return String(value == null ? "" : value).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function theme() {
    if (config.theme === "dark" || config.theme === "light") return config.theme;
    return darkScheme && darkScheme.matches ? "dark" : "light";
  }

  function itemMarkup(item) {
    var body =
      (item.category ? '<span class="item__cat">' + escapeHtml(item.category) + '</span>' : '') +
      '<span class="item__headline">' + escapeHtml(item.headline) + '</span>' +
      (item.timestamp ? '<span class="item__time">' + escapeHtml(item.timestamp) + '</span>' : '');
    if (item.url) {
      return '<a class="item" href="' + escapeHtml(item.url) + '" target="_blank" rel="noopener">' + body + '</a>';
    }
    return '<span class="item">' + body + '</span>';
  }

  function group(list, repeat) {
    var unit = "";
    for (var i = 0; i < list.length; i++) {
      unit += itemMarkup(list[i]) + '<span class="sep" aria-hidden="true"></span>';
    }
    var html = "";
    for (var r = 0; r < repeat; r++) html += unit;
    return '<div class="ticker__group">' + html + '</div>';
  }

  function applyTheme() {
    ticker.setAttribute("data-theme", theme());
  }

  function layout() {
    var list = items.length ? items : [{ headline: "" }];

    track.innerHTML = group(list, 1);
    var single = track.querySelector(".ticker__group");
    var unitWidth = single ? single.getBoundingClientRect().width : 1;
    var viewWidth = viewport.getBoundingClientRect().width || 1;
    var repeat = Math.max(1, Math.ceil((viewWidth * 1.5) / Math.max(unitWidth, 1)));

    track.innerHTML = group(list, repeat) + group(list, repeat);

    var first = track.querySelector(".ticker__group");
    var groupWidth = first ? first.getBoundingClientRect().width : viewWidth;
    var speed = config.speed > 0 ? config.speed : 35;
    track.style.animationDuration = Math.max(10, groupWidth / speed).toFixed(2) + "s";
    track.style.animationDirection = config.direction === "right" ? "reverse" : "normal";

    ticker.classList.toggle("hoverable", config.pauseOnHover !== false);
    if (config.label) {
      label.textContent = config.label;
      label.classList.add("on");
      labelSep.classList.add("on");
    } else {
      label.classList.remove("on");
      labelSep.classList.remove("on");
    }
  }

  function render() {
    applyTheme();
    requestAnimationFrame(layout);
  }

  if (darkScheme) {
    var onScheme = function () { if (config.theme === "auto") applyTheme(); };
    if (darkScheme.addEventListener) darkScheme.addEventListener("change", onScheme);
    else if (darkScheme.addListener) darkScheme.addListener(onScheme);
  }

  var resizeTimer;
  window.addEventListener("resize", function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(layout, 200);
  });

  window.MarketNews = {
    set: function (next) {
      if (!next) return;
      if (next.config) config = next.config;
      if (next.items) items = next.items;
      render();
    }
  };

  render();
})();
</script>
</body>
</html>
