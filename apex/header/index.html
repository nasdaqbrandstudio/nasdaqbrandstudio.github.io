<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nasdaq Video Module</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
  :root {
    --apex-bg: #08062A;
    --apex-font: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    --apex-poster: url('assets/spacex-background.jpg');
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }

  .apex-video {
    font-family: var(--apex-font);
    background: #000;
    width: 100%;
    height: 100%;
    -webkit-font-smoothing: antialiased;
  }

  .apex-video__stage {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .apex-video__blur {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(1.15);
    filter: blur(8px);
    z-index: 0;
    opacity: 0;
    transition: opacity .4s ease;
  }

  .apex-video__tint {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: var(--apex-bg);
    opacity: 0;
    transition: opacity .4s ease;
  }

  .apex-video.mirror-on .apex-video__blur { opacity: 1; }
  .apex-video.mirror-on .apex-video__tint { opacity: .8; }

  .apex-video__bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity .4s ease;
  }

  .apex-video.has-bg .apex-video__blur,
  .apex-video.has-bg .apex-video__tint { opacity: 0 !important; }
  .apex-video.has-bg .apex-video__bg { opacity: 1; }

  .apex-video__pillar {
    position: relative;
    z-index: 2;
    height: 100%;
    aspect-ratio: 16 / 9;
    max-width: 100%;
    background: #000;
    overflow: hidden;
  }

  .apex-video__player {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .apex-video__player .jwplayer,
  .apex-video__player .jw-wrapper { width: 100% !important; height: 100% !important; }

  .apex-video__live {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 5;
    display: none;
    align-items: center;
    gap: 6px;
    background: #CC1C27;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 5px 9px;
    border-radius: 3px;
  }
  .apex-video__live.is-on { display: inline-flex; }
  .apex-video__live::before {
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #fff;
    animation: apexBlink 1.4s steps(1) infinite;
  }
  @keyframes apexBlink { 50% { opacity: 0; } }

  .apex-video__placeholder {
    position: absolute;
    inset: 0;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-family: var(--apex-font);
    font-size: 13px;
    text-align: center;
    padding: 16px;
    background: #000;
  }

  .apex-video__poster {
    position: absolute;
    inset: 0;
    z-index: 1;
    background-image: var(--apex-poster);
    background-size: cover;
    background-position: center;
    transition: opacity .4s ease;
  }
  .apex-video.is-playing .apex-video__poster { opacity: 0; }
</style>
</head>
<body>

<div class="apex-video" id="apexVideo" role="region" aria-label="Featured video">
  <div class="apex-video__stage" id="apexStage">
    <canvas class="apex-video__blur" id="apexBlur" aria-hidden="true"></canvas>
    <div class="apex-video__bg" id="apexBg" aria-hidden="true"></div>
    <div class="apex-video__tint" aria-hidden="true"></div>
    <div class="apex-video__pillar" id="apexPillar">
      <div class="apex-video__poster" id="apexPoster" aria-hidden="true"></div>
      <span class="apex-video__live" id="apexLive">Live</span>
      <div class="apex-video__player" id="apexPlayer"></div>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  var VIDEO = {
    playerId: "hVkrU1kZ",
    mediaId:  "rgE7wtxY",
    streamUrl: "",
    autoplay: true,
    mute: true,
    loop: true,
    controls: false,
    revealSeconds: 4,
    isLive: false,
    mirror: true,
    background: "assets/header-background-dark.jpg"
  };

  var root     = document.getElementById("apexVideo");
  var stage    = document.getElementById("apexStage");
  var pillar   = document.getElementById("apexPillar");
  var playerEl = document.getElementById("apexPlayer");
  var liveEl   = document.getElementById("apexLive");
  var bgEl     = document.getElementById("apexBg");
  var blur     = document.getElementById("apexBlur");
  var bctx     = blur.getContext ? blur.getContext("2d") : null;

  /* ---------- placeholder ---------- */

  function showPlaceholder(msg) {
    var ph = pillar.querySelector(".apex-video__placeholder");
    if (!ph) {
      ph = document.createElement("div");
      ph.className = "apex-video__placeholder";
      pillar.appendChild(ph);
    }
    ph.textContent = msg;
  }

  function clearPlaceholder() {
    var ph = pillar.querySelector(".apex-video__placeholder");
    if (ph) ph.parentNode.removeChild(ph);
  }

  function showPosterFallback() {
    clearPlaceholder();
    root.classList.remove("is-playing", "mirror-on");
  }

  /* ---------- jwplayer config ---------- */

  function libUrl() { return "https://cdn.jwplayer.com/libraries/" + VIDEO.playerId + ".js"; }
  function needIds() { return !VIDEO.playerId || /REPLACE_/.test(VIDEO.playerId); }

  function jwConfig() {
    var auto = !!VIDEO.autoplay;
    var cfg = {
      width: "100%",
      height: "100%",
      autostart: auto ? "viewable" : false,
      mute: auto ? true : !!VIDEO.mute,
      repeat: !!VIDEO.loop,
      controls: VIDEO.controls !== false
    };
    if (VIDEO.streamUrl) cfg.file = VIDEO.streamUrl;
    else cfg.playlist = "https://cdn.jwplayer.com/v2/media/" + VIDEO.mediaId;
    return cfg;
  }

  /* ---------- static background (optional) ---------- */

  var bgUrl = null, bgResolved = false;

  function applyBackground() {
    if (!bgResolved) return;
    if (bgUrl) {
      bgEl.style.backgroundImage = "url('" + bgUrl + "')";
      root.classList.add("has-bg");
      root.classList.remove("mirror-on");
      VIDEO.mirror = false;
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      if (bctx) bctx.clearRect(0, 0, blur.width, blur.height);
    } else {
      bgEl.style.backgroundImage = "";
      root.classList.remove("has-bg");
    }
  }

  function resolveBackground(done) {
    if (bgResolved || !VIDEO.background) {
      bgResolved = true;
      done();
      return;
    }
    var img = new Image();
    img.onload  = function () { bgUrl = VIDEO.background; bgResolved = true; done(); };
    img.onerror = function () { bgUrl = null; bgResolved = true; done(); };
    img.src = VIDEO.background;
  }

  /* ---------- blurred video mirror ---------- */

  var rafId = null, mirrorVideo = null;

  function findVideoEl() {
    // JW Player replaces the #apexPlayer element on setup, so the original
    // playerEl reference may be detached — fall back to a live DOM query.
    return playerEl.querySelector("video") || document.querySelector("#apexPlayer video");
  }

  function stopMirror() {
    VIDEO.mirror = false;
    root.classList.remove("mirror-on");
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  }

  function sizeCanvas() {
    var r = stage.getBoundingClientRect();
    blur.width  = Math.max(16, Math.round(r.width  / 6));
    blur.height = Math.max(9,  Math.round(r.height / 6));
  }

  function drawMirror() {
    if (!VIDEO.mirror || !bctx) return;
    if (!mirrorVideo) mirrorVideo = findVideoEl();
    if (mirrorVideo && mirrorVideo.readyState >= 2 && mirrorVideo.videoWidth) {
      try {
        var cw = blur.width, ch = blur.height;
        var vw = mirrorVideo.videoWidth, vh = mirrorVideo.videoHeight;
        var scale = Math.max(cw / vw, ch / vh);
        var dw = vw * scale, dh = vh * scale;
        bctx.drawImage(mirrorVideo, (cw - dw) / 2, (ch - dh) / 2, dw, dh);
        if (!root.classList.contains("mirror-on")) root.classList.add("mirror-on");
      } catch (e) {
        stopMirror();
        return;
      }
    }
    rafId = requestAnimationFrame(drawMirror);
  }

  function startMirror() {
    if (!VIDEO.mirror || !bctx) return;
    sizeCanvas();
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(drawMirror);
  }

  /* ---------- tap-to-reveal controls ---------- */

  var revealTimer = null;

  function bindReveal(p) {
    var secs = (typeof VIDEO.revealSeconds === "number") ? VIDEO.revealSeconds : 4;
    function hide() { try { p.setControls(false); } catch (e) {} }
    function reveal() {
      try { p.setControls(true); } catch (e) {}
      if (revealTimer) clearTimeout(revealTimer);
      revealTimer = setTimeout(hide, secs * 1000);
    }
    hide();
    pillar.addEventListener("contextmenu", function (e) { e.preventDefault(); reveal(); });
    pillar.addEventListener("touchend", function () { reveal(); });
  }

  /* ---------- player ---------- */

  function mountPlayer() {
    clearPlaceholder();
    if (needIds()) { showPlaceholder("Set playerId / mediaId in the VIDEO config."); return; }
    if (!window.jwplayer) { showPosterFallback(); stopMirror(); return; }
    try {
      var p = window.jwplayer(playerEl);
      p.setup(jwConfig());
      p.on("ready", function () {
        mirrorVideo = findVideoEl();
        bindReveal(p);
      });
      p.on("firstFrame", onPlaying);
      p.on("play", onPlaying);
      p.on("setupError", function () { showPosterFallback(); stopMirror(); });
      p.on("error",      function () { showPosterFallback(); stopMirror(); });
    } catch (e) {
      showPosterFallback();
      stopMirror();
      if (window.console) console.warn("[apex-video]", e);
    }
  }

  function onPlaying() {
    root.classList.add("is-playing");
    if (VIDEO.mirror && !root.classList.contains("has-bg") && !rafId) startMirror();
  }

  function start() {
    liveEl.classList.toggle("is-on", !!VIDEO.isLive);
    mountPlayer();
  }

  function boot() {
    resolveBackground(function () {
      applyBackground();
      if (window.jwplayer || needIds()) { start(); return; }
      var sc = document.createElement("script");
      sc.src = libUrl();
      sc.async = true;
      sc.onload = start;
      sc.onerror = function () { start(); };
      document.head.appendChild(sc);
    });
  }

  var rt;
  window.addEventListener("resize", function () {
    clearTimeout(rt);
    rt = setTimeout(sizeCanvas, 150);
  });

  /* ---------- public API ---------- */

  window.ApexVideo = {
    swap: function (opts) {
      opts = opts || {};
      ["playerId", "mediaId", "streamUrl", "autoplay", "mute", "loop", "controls",
       "revealSeconds", "isLive", "mirror"].forEach(function (k) {
        if (opts[k] != null) VIDEO[k] = opts[k];
      });
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      if (revealTimer) { clearTimeout(revealTimer); revealTimer = null; }
      mirrorVideo = null;
      root.classList.remove("is-playing", "mirror-on");
      try { if (window.jwplayer) window.jwplayer(playerEl).remove(); } catch (e) {}
      start();
    }
  };

  boot();
})();
</script>
</body>
</html>
