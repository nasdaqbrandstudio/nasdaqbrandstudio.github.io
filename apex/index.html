<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<title>Nasdaq APEX</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #fff; }

  .nasdaq-navbar {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 48px;
    background: #fff;
  }
  .navigation---primary-navigation {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nasdaq-navbar a { display: flex; }
  .vectors-wrapper-4 {
    display: block;
    height: 24px;
    width: auto;
  }

  iframe.apex-frame {
    display: block;
    width: 100%;
    border: 0;
    margin: 0;
    padding: 0;
    vertical-align: top;
  }

  img.apex-still {
    display: block;
    width: 100%;
    object-fit: contain;
    background: #000;
    margin: 0;
    padding: 0;
    vertical-align: top;
  }

  .apex-switcher {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 12px 0;
    background: #fff;
  }
  .apex-switcher button {
    font: 500 13px/1 "Inter", Arial, sans-serif;
    color: #08062A;
    background: #fff;
    border: 1px solid #08062A;
    border-radius: 4px;
    padding: 8px 16px;
    cursor: pointer;
  }
  .apex-switcher button.active {
    background: #0092BC;
    border-color: #0092BC;
    color: #fff;
  }

  img.apex-homepage {
    display: block;
    width: 100%;
    height: auto;
    margin: 0;
    padding: 0;
    vertical-align: top;
  }
</style>
</head>
<body>
<nav id="home" class="nasdaq-navbar">
  <div class="navigation---primary-navigation">
    <a href="https://www.nasdaq.com/" class="w-inline-block">
      <img width="85" height="24" alt="Nasdaq Logo" src="https://cdn.prod.website-files.com/6941b8df653484a551b7b3d9/6941b8df653484a551b7b40b_Vectors-Wrapper.svg" loading="lazy" class="vectors-wrapper-4">
    </a>
  </div>
</nav>

<iframe id="apexHeader" class="apex-frame" src="https://nasdaqbrandstudio.github.io/apex/header/" title="Featured video" allow="autoplay; fullscreen" scrolling="no" style="display: none;"></iframe>

<img id="apexStill" class="apex-still" src="https://nasdaqbrandstudio.github.io/apex/header/assets/spacex-banner.jpg" alt="Featured image">

<div class="apex-switcher">
  <button id="btnImage" type="button" class="active">Image Module</button>
  <button id="btnVideo" type="button">Video Module</button>
</div>

<img class="apex-homepage" src="https://nasdaqbrandstudio.github.io/apex/nasdaq-homepage.jpg" alt="Nasdaq homepage">

<script>
(function () {
  "use strict";
  var header = document.getElementById("apexHeader");
  var still = document.getElementById("apexStill");
  var btnImage = document.getElementById("btnImage");
  var btnVideo = document.getElementById("btnVideo");
  var nav = 48;
  var ticker = 64; // ticker removed, but its height is reserved to keep the header size unchanged

  function size() {
    var width = document.documentElement.clientWidth;
    var sixteenNine = width * 9 / 16;
    var fit = window.innerHeight - nav - ticker;
    var h = Math.min(sixteenNine, fit) + "px";
    header.style.height = h;
    still.style.height = h;
  }

  function show(mode) {
    var video = mode === "video";
    header.style.display = video ? "block" : "none";
    still.style.display = video ? "none" : "block";
    btnVideo.classList.toggle("active", video);
    btnImage.classList.toggle("active", !video);
  }

  btnImage.addEventListener("click", function () { show("image"); });
  btnVideo.addEventListener("click", function () { show("video"); });

  show("image");
  size();
  var timer;
  window.addEventListener("resize", function () {
    clearTimeout(timer);
    timer = setTimeout(size, 120);
  });
})();
</script>
</body>
</html>
