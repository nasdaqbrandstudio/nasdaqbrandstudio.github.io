<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SpaceX Lists on Nasdaq</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #fff; }

  .nasdaq-navbar {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 48px;
    background: #fff;
  }
  .navigation---primary-navigation {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nasdaq-navbar a { display: flex; }
  .vectors-wrapper-4 {
    display: block;
    height: 24px;
    width: auto;
  }

  iframe.apex-frame {
    display: block;
    width: 100%;
    border: 0;
    margin: 0;
    padding: 0;
    vertical-align: top;
  }

  img.apex-homepage {
    display: block;
    width: 100%;
    height: auto;
    margin: 0;
    padding: 0;
    vertical-align: top;
  }
</style>
</head>
<body>
<nav id="home" class="nasdaq-navbar">
  <div class="navigation---primary-navigation">
    <a href="https://www.nasdaq.com/" class="w-inline-block">
      <img width="85" height="24" alt="Nasdaq Logo" src="https://cdn.prod.website-files.com/6941b8df653484a551b7b3d9/6941b8df653484a551b7b40b_Vectors-Wrapper.svg" loading="lazy" class="vectors-wrapper-4">
    </a>
  </div>
</nav>

<!-- header-module-container -->
<iframe id="apexHeader" class="apex-frame" src="https://nasdaqbrandstudio.github.io/apex/module/" data-module="module" title="SpaceX Lists on Nasdaq" allow="autoplay; fullscreen" scrolling="no"></iframe>
<script>
(function () {
  "use strict";

  /* GitHub URLs for testing; final hosting keeps the /apex/... levels. */
  var MODULES = {
    header: { src: "https://nasdaqbrandstudio.github.io/apex/header/", title: "SpaceX Livestream" },
    module: { src: "https://nasdaqbrandstudio.github.io/apex/module/", title: "SpaceX Lists on Nasdaq" }
  };

  var frame = document.getElementById("apexHeader");

  /* Height available below whatever sits above the container, measured
     rather than hardcoded so nav changes don't break the math. */
  function availableHeight() {
    var top = frame.getBoundingClientRect().top + window.scrollY;
    return window.innerHeight - top;
  }

  /* The data-module attribute is the source of truth for what's loaded.
     Sizing rules differ per module:
     - module: fixed content heights on mobile (the module's own CSS minimums),
       full available height on desktop.
     - header: 16:9 livestream, capped at the available height. */
  function size() {
    var vw = document.documentElement.clientWidth;
    if (frame.getAttribute("data-module") === "module") {
      frame.style.height = (vw < 480 ? 700 : vw < 992 ? 600 : Math.max(availableHeight(), 440)) + "px";
    } else {
      frame.style.height = Math.min(vw * 9 / 16, availableHeight()) + "px";
    }
  }

  /* Switching hook. Call show("header") or show("module").
     No-op if that module is already loaded, so it's safe to call repeatedly. */
  function show(name) {
    var m = MODULES[name];
    if (!m || frame.getAttribute("data-module") === name) return;
    frame.setAttribute("data-module", name);
    frame.title = m.title;
    frame.src = m.src;
    size();
  }

  size();

  var timer;
  window.addEventListener("resize", function () {
    clearTimeout(timer);
    timer = setTimeout(size, 120);
  });

  window.ApexHeaderContainer = { show: show };
})();
</script>
<!-- /header-module-container -->

<img class="apex-homepage" src="https://nasdaqbrandstudio.github.io/apex/nasdaq-homepage.jpg" alt="Nasdaq homepage">

</body>
</html>
